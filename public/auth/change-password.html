<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Change password · TNT Maritime Intelligence</title>
  <link rel="stylesheet" href="/auth/login.css">
</head>
<body>
  <div class="login-shell">
    <aside class="login-visual" aria-hidden="true">
      <div class="visual-veil"></div>
      <div class="visual-content">
        <p class="brand-mark">TNT</p>
        <p class="brand-tag">Global Maritime Commodity Intelligence</p>
        <p class="brand-members">Administrator-controlled access</p>
      </div>
    </aside>
    <main class="login-panel">
      <div class="panel-inner">
        <header class="panel-header">
          <h1>Secure your account</h1>
          <p>Replace your temporary password before continuing to the portal.</p>
        </header>
        <form id="change-form" class="login-form" novalidate>
          <div class="field">
            <label for="currentPassword">Current password</label>
            <input id="currentPassword" type="password" autocomplete="current-password" required maxlength="128">
          </div>
          <div class="field">
            <label for="newPassword">New password</label>
            <input id="newPassword" type="password" autocomplete="new-password" required maxlength="128">
            <p class="field-hint">At least 8 characters with one letter and one number.</p>
          </div>
          <div class="field">
            <label for="confirmPassword">Confirm new password</label>
            <input id="confirmPassword" type="password" autocomplete="new-password" required maxlength="128">
          </div>
          <div id="change-error" class="form-error" role="alert" hidden></div>
          <button type="submit" class="submit-btn" id="submit-btn">
            <span class="btn-label">Change password</span>
            <span class="btn-spinner" hidden aria-hidden="true"></span>
          </button>
        </form>
        <p class="auth-switch"><a href="#" id="sign-out">Sign out</a></p>
      </div>
    </main>
  </div>
  <script src="/auth/change-password.js"></script>
</body>
</html>
